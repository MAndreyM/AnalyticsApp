name: CI - Develop Branch

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  # Быстрая проверка для PR в develop
  pr-validation:
    name: "PR Validation - Feature → Develop"
    runs-on: ubuntu-latest
    container:
      image: registry.altlinux.org/alt/alt:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y cmake ninja-build g++ git
        
    - name: Build with development features
      run: |
        mkdir build && cd build
        cmake -G Ninja -DENABLE_DEVELOPMENT_FEATURES=ON ..
        ninja
        
    - name: Test basic functionality
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: Check commit message convention
      run: |
        echo "Checking commit messages..."
        git log --oneline -5 | head -5

  # Полная сборка на всех платформах после мерджа в develop
  full-platform-build:
    name: "Full Platform Build"
    needs: pr-validation
    if: github.event_name == 'push'
    strategy:
      matrix:
        platform: 
          - name: redos
            image: redos.red-soft.ru/redos/redos:latest
          - name: altlinux-10
            image: registry.altlinux.org/alt/alt:10
          - name: windows
            runs-on: windows-latest
    
    runs-on: ${{ matrix.platform.runs-on || 'ubuntu-latest' }}
    container:
      image: ${{ matrix.platform.image }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup environment
      run: |
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y cmake ninja-build g++ git
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update && apt-get install -y cmake ninja-build g++ git
        else
          # Windows
          choco install ninja -y
        fi
        
    - name: Build with development flags
      run: |
        mkdir build && cd build
        cmake -G Ninja -DENABLE_DEVELOPMENT_FEATURES=ON ..
        ninja
        
    - name: Test application
      run: |
        cd build
        if [ -f "./bin/analytics_app" ]; then
          ./bin/analytics_app --help
        else
          .\bin\analytics_app.exe --help
        fi
        
    - name: Build status
      run: |
        echo "✅ Build successful on ${{ matrix.platform.name }}"