name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true

  build-release-binaries:
    name: "Build Release Binaries"
    needs: create-release
    strategy:
      matrix:
        platform: 
          - image: redos.red-soft.ru/redos/redos:latest
            name: redos
            asset_name: analytics-app-redos
          - image: registry.altlinux.org/alt/alt:10
            name: altlinux10
            asset_name: analytics-app-altlinux10
    
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.platform.image }}
    
    steps:
    - name: Install dependencies
      run: |
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y cmake ninja-build g++ git
        else
          apt-get update && apt-get install -y cmake ninja-build g++ git
        fi
        
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build release binary
      run: |
        mkdir build && cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
        ninja
        
    - name: Create release package
      run: |
        mkdir -p release
        cp build/bin/analytics_app release/
        cp README.md release/
        tar -czf ${{ matrix.platform.asset_name }}-${{ github.ref_name }}.tar.gz -C release .
        
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.platform.asset_name }}-${{ github.ref_name }}.tar.gz
        asset_name: ${{ matrix.platform.asset_name }}-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip
        
    - name: Release status
      run: |
        echo "🎉 Release ${{ github.ref_name }} built for ${{ matrix.platform.name }}"
        echo "Asset: ${{ matrix.platform.asset_name }}-${{ github.ref_name }}.tar.gz"