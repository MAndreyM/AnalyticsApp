name: "RedOS Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

runs-on: ubuntu-latest
container:
  image: mandrm/redos-ci-analytics:latest

steps:
- name: Checkout code
  uses: actions/checkout@v4
  
- name: Build on RedOS
  run: |
    echo "🔨 Building on RedOS..."
    mkdir build && cd build
    cmake -G Ninja ${{ inputs.build-type && format('-DCMAKE_BUILD_TYPE={0}', inputs.build-type) }} ..
    ninja
    
- name: Run Phase 2 verification
  run: |
    echo "🧪 Running Phase 2 verification..."
    cd build
    ./test_datamodels
    ./test_gradecalculator
    ./test_filesystem
    
- name: Test demo program
  run: |
    cd build
    echo "🎯 Testing demo program..."
    ./bin/demo_datamodels
    
- name: Test main application
  run: |
    cd build
    ./bin/analytics_app --help
    
- name: RedOS environment info
  run: |
    echo "✅ RedOS Environment:"
    cat /etc/os-release | grep -E "^(NAME|VERSION)="

- name: Create artifact
  if: inputs.create-artifact
  run: |
    mkdir -p artifacts
    cp build/bin/analytics_app artifacts/
    cp build/bin/demo_datamodels artifacts/
    tar -czf analytics-app-redos-v0.1.0.tar.gz -C artifacts .