name: CI - Debug Windows Build

on:
  push:
    branches: [ 'debug/job-windows-build' ]
  pull_request:
    branches: [ 'debug/job-windows-build' ]

jobs:
  windows-build:
    uses: ./.github/workflows/job-windows-build.yaml

  windows-debug-report:
    runs-on: ubuntu-latest
    needs: [windows-build]
    steps:
      - name: Generate Windows debug report
        run: |
          echo "🔧 WINDOWS DEBUG BUILD REPORT"
          echo "=============================="
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "📋 Build Status:"
          echo "✅ Windows: Build successful with libxls"
          echo ""
          echo "🛠️ Debug Information:"
          echo "  - Job: windows-build"
          echo "  - Platform: Windows"
          echo "  - Compiler: gcc-13"
          echo "  - libxls: Built from sources"
          echo "  - Excel file support: ENABLED"
          echo ""
          echo "🧪 Current Focus:"
          echo "  - Debugging job-windows-build.yaml configuration"
          echo "  - Testing libxls compilation from sources"
          echo "  - Verifying Windows build stability"
          echo ""
          echo "📝 Next Steps:"
          echo "  - Continue debugging build configuration"
          echo "  - Test Excel file parsing functionality"
          echo "  - Verify binary compatibility"
          echo ""
          echo "🔍 Debug session active on branch: debug/job-windows-build"