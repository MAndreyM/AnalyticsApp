name: "Windows Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSYS2 with available GCC
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: |
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          make
          autoconf
          automake
          libtool
          wget
        
    - name: Find and install libxls
      shell: msys2 {0}
      run: |
        echo "🔍 Searching for available libxls packages..."
        pacman -Ss libxls
        
        echo "📦 Installing libxls..."
        # Пробуем установить libxls из репозиториев
        if pacman -S --noconfirm mingw-w64-x86_64-libxls 2>/dev/null; then
          echo "✅ libxls installed from MSYS2 repositories"
        else
          echo "⚠️  libxls not found in repositories, building from source..."
          # Запасной вариант - сборка из исходников
          cd /tmp
          wget https://github.com/libxls/libxls/releases/download/v1.6.2/libxls-1.6.2.tar.gz
          tar -xzf libxls-1.6.2.tar.gz
          cd libxls-1.6.2
          
          ./configure --prefix=/mingw64
          make
          
          # Устанавливаем вручную
          mkdir -p /mingw64/include/libxls
          cp include/libxls/*.h /mingw64/include/libxls/
          cp include/xls.h /mingw64/include/
          cp src/.libs/libxlsreader.a /mingw64/lib/
          cp src/.libs/libxlsreader.dll.a /mingw64/lib/
          cp src/.libs/libxlsreader-2.dll /mingw64/bin/
          
          # Создаем pkg-config файл
          cat > /mingw64/lib/pkgconfig/libxls.pc << EOF
          prefix=/mingw64
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          
          Name: libxls
          Description: Library for reading Excel XLS files
          Version: 1.6.2
          Libs: -L\${libdir} -lxlsreader
          Cflags: -I\${includedir}
          EOF
          echo "✅ libxls built from source"
        fi
        
        echo "✅ Verification:"
        pkg-config --exists libxls && echo "✅ pkg-config can find libxls"
        find /mingw64 -name "*xls*" -type f
        
    - name: Build application
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        
        BUILD_TYPE_FLAG=""
        if [ -n "${{ inputs.build-type }}" ]; then
          BUILD_TYPE_FLAG="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        fi
        
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"
        
        cmake -G Ninja $BUILD_TYPE_FLAG ..
        ninja
        
    - name: Run tests
      shell: msys2 {0}
      run: |
        cd build
        echo "🧪 Running tests..."
        ./test_datamodels.exe
        ./test_gradecalculator.exe
        ./test_filesystem.exe
        
    - name: Test demo programs
      shell: msys2 {0}
      run: |
        cd build
        echo "🎯 Testing demo programs..."
        ./bin/demo_datamodels.exe
        ./bin/analytics_app.exe --help
        
    - name: Verify Excel support
      shell: msys2 {0}
      run: |
        cd build
        echo "📊 Verifying Excel support..."
        if ./bin/analytics_app.exe --help | grep -i excel; then
          echo "✅ Excel support: ENABLED"
          ./bin/analytics_app.exe --version && echo "✅ Application works correctly"
        else
          echo "❌ Excel support: DISABLED"
          exit 1
        fi
        
    - name: Create artifact
      if: ${{ inputs.create-artifact }}
      shell: cmd
      run: |
        mkdir artifacts
        copy build\bin\analytics_app.exe artifacts\
        copy build\bin\demo_datamodels.exe artifacts\
        copy C:\msys64\mingw64\bin\libxlsreader*.dll artifacts\ 2>nul || echo "No libxls DLLs to copy"
        copy C:\msys64\mingw64\bin\libiconv*.dll artifacts\ 2>nul || echo "No iconv DLLs to copy"
        copy C:\msys64\mingw64\bin\libwinpthread*.dll artifacts\ 2>nul || echo "No pthread DLLs to copy"
        Compress-Archive -Path artifacts\* -DestinationPath analytics-app-windows-v0.1.0.zip
        
    - name: Windows build report
      shell: msys2 {0}
      run: |
        echo "🏗️  Windows Build Report"
        echo "========================"
        gcc --version | head -1
        echo "✅ libxls: INSTALLED"
        echo "✅ Application: COMPILED"
        echo "✅ Tests: PASSED"
        echo "✅ Excel Parsing: ENABLED"
        echo "📦 Artifact: READY"