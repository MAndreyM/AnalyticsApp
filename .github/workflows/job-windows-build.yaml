name: "Windows Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSYS2 with available GCC
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: |
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          make
          autoconf
          automake
          libtool
          wget
        
    - name: Build and install libxls 1.6.3
      shell: msys2 {0}
      run: |
        echo "📦 Building libxls 1.6.3 with available GCC..."
        
        # Проверяем версию GCC
        gcc --version
        
        cd /tmp
        wget https://github.com/libxls/libxls/releases/download/v1.6.3/libxls-1.6.3.tar.gz
        tar -xzf libxls-1.6.3.tar.gz
        cd libxls-1.6.3
        
        # Исправляем конфигурацию для правильной установки
        ./configure --prefix=/mingw64
        
        # В версии 1.6.3 используем обычный make для сборки C библиотеки
        echo "🔨 Building library..."
        make
        
        # Устанавливаем вручную
        echo "📥 Installing to /mingw64..."
        mkdir -p /mingw64/include/libxls
        mkdir -p /mingw64/lib/pkgconfig
        mkdir -p /mingw64/bin
        
        # Копируем заголовочные файлы
        cp include/libxls/*.h /mingw64/include/libxls/
        cp include/xls.h /mingw64/include/
        
        # Копируем библиотеки из правильных мест
        if [ -f "src/.libs/libxlsreader.a" ]; then
            cp src/.libs/libxlsreader.a /mingw64/lib/
        fi
        if [ -f "src/.libs/libxlsreader.dll.a" ]; then
            cp src/.libs/libxlsreader.dll.a /mingw64/lib/
        fi
        if [ -f "src/.libs/libxlsreader-2.dll" ]; then
            cp src/.libs/libxlsreader-2.dll /mingw64/bin/
        elif [ -f "src/.libs/libxlsreader.dll" ]; then
            cp src/.libs/libxlsreader.dll /mingw64/bin/
        fi
        
        # Создаем pkg-config файл вручную
        cat > /mingw64/lib/pkgconfig/libxls.pc << EOF
        prefix=/mingw64
        exec_prefix=\${prefix}
        libdir=\${exec_prefix}/lib
        includedir=\${prefix}/include
        
        Name: libxls
        Description: Library for reading Excel XLS files
        Version: 1.6.3
        Libs: -L\${libdir} -lxlsreader
        Cflags: -I\${includedir}
        EOF
        
        # Проверяем установку
        echo "✅ libxls 1.6.3 installation check:"
        find /mingw64 -name "*xls*" -type f
        pkg-config --exists libxls && echo "✅ pkg-config can find libxls"
        
    - name: Build application
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        
        BUILD_TYPE_FLAG=""
        if [ -n "${{ inputs.build-type }}" ]; then
          BUILD_TYPE_FLAG="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        fi
        
        # Принудительно указываем путь к pkg-config
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"
        
        cmake -G Ninja $BUILD_TYPE_FLAG ..
        ninja
        
    - name: Run tests
      shell: msys2 {0}
      run: |
        cd build
        echo "🧪 Running tests..."
        ./test_datamodels.exe
        ./test_gradecalculator.exe
        ./test_filesystem.exe
        
    - name: Test demo programs
      shell: msys2 {0}
      run: |
        cd build
        echo "🎯 Testing demo programs..."
        ./bin/demo_datamodels.exe
        ./bin/analytics_app.exe --help
        
    - name: Verify Excel support
      shell: msys2 {0}
      run: |
        cd build
        echo "📊 Verifying Excel support..."
        if ./bin/analytics_app.exe --help | grep -i excel; then
          echo "✅ Excel support: ENABLED"
          ./bin/analytics_app.exe --version && echo "✅ Application works correctly"
        else
          echo "❌ Excel support: DISABLED"
          exit 1
        fi
        
    - name: Create artifact
      if: ${{ inputs.create-artifact }}
      shell: cmd
      run: |
        mkdir artifacts
        copy build\bin\analytics_app.exe artifacts\
        copy build\bin\demo_datamodels.exe artifacts\
        # Копируем DLL зависимости
        copy C:\msys64\mingw64\bin\libxlsreader*.dll artifacts\ 2>nul || echo "No libxls DLLs to copy"
        copy C:\msys64\mingw64\bin\libiconv*.dll artifacts\ 2>nul || echo "No iconv DLLs to copy"
        copy C:\msys64\mingw64\bin\libwinpthread*.dll artifacts\ 2>nul || echo "No pthread DLLs to copy"
        Compress-Archive -Path artifacts\* -DestinationPath analytics-app-windows-v0.1.0.zip
        
    - name: Windows build report
      shell: msys2 {0}
      run: |
        echo "🏗️  Windows Build Report"
        echo "========================"
        gcc --version | head -1
        echo "✅ libxls: INSTALLED (v1.6.3)"
        echo "✅ Application: COMPILED"
        echo "✅ Tests: PASSED"
        echo "✅ Excel Parsing: ENABLED"
        echo "📦 Artifact: READY"
        echo ""
        echo "🎯 All platforms now support Excel file parsing!"