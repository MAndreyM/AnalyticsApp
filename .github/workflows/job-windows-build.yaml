name: "Windows Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSYS2 and install libxls
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: |
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-libxls
        
    - name: Build application with MSYS2
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        
        BUILD_TYPE_FLAG=""
        if [ -n "${{ inputs.build-type }}" ]; then
          BUILD_TYPE_FLAG="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        fi
        
        # Сборка с автоматически найденным libxls
        cmake -G Ninja $BUILD_TYPE_FLAG ..
        ninja
        
    - name: Run Phase 2 verification
      shell: msys2 {0}
      run: |
        cd build
        echo "🧪 Running Phase 2 verification..."
        ./test_datamodels.exe
        ./test_gradecalculator.exe
        ./test_filesystem.exe
        
    - name: Test applications
      shell: msys2 {0}
      run: |
        cd build
        echo "🎯 Testing applications..."
        ./bin/demo_datamodels.exe
        ./bin/analytics_app.exe --help
        
    - name: Create artifact
      if: ${{ inputs.create-artifact }}
      shell: cmd
      run: |
        mkdir artifacts
        copy build\bin\analytics_app.exe artifacts\
        copy build\bin\demo_datamodels.exe artifacts\
        Compress-Archive -Path artifacts\* -DestinationPath analytics-app-windows-v0.1.0.zip