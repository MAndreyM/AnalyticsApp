name: "Windows Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSYS2 and install base dependencies
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: |
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          make
          autoconf
          automake
          libtool
          wget
        
    - name: Build libxls from source (C library only)
      shell: msys2 {0}
      run: |
        echo "📦 Building libxls C library from source..."
        
        # Скачиваем и собираем libxls
        cd /tmp
        wget https://github.com/libxls/libxls/releases/download/v1.6.2/libxls-1.6.2.tar.gz
        tar -xzf libxls-1.6.2.tar.gz
        cd libxls-1.6.2
        
        # Собираем только C библиотеку, пропускаем C++ часть
        ./configure --prefix=/mingw64
        make -C src
        
        # Устанавливаем вручную только нужные файлы
        mkdir -p /mingw64/include
        mkdir -p /mingw64/lib
        cp include/*.h /mingw64/include/
        cp src/.libs/libxlsreader.a /mingw64/lib/
        cp src/.libs/libxlsreader.dll.a /mingw64/lib/
        cp src/.libs/libxlsreader-2.dll /mingw64/bin/ 2>/dev/null || true
        
        echo "✅ libxls C library installed to /mingw64"
        
        # Проверяем установку
        ls -la /mingw64/include/xls.h
        ls -la /mingw64/lib/libxlsreader*
        
    - name: Build application
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        
        BUILD_TYPE_FLAG=""
        if [ -n "${{ inputs.build-type }}" ]; then
          BUILD_TYPE_FLAG="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        fi
        
        cmake -G Ninja $BUILD_TYPE_FLAG ..
        ninja
        
    - name: Run tests
      shell: msys2 {0}
      run: |
        cd build
        echo "🧪 Running tests..."
        ./test_datamodels.exe
        ./test_gradecalculator.exe
        ./test_filesystem.exe
        
    - name: Test demo programs
      shell: msys2 {0}
      run: |
        cd build
        echo "🎯 Testing demo programs..."
        ./bin/demo_datamodels.exe
        ./bin/analytics_app.exe --help
        
    - name: Verify Excel support
      shell: msys2 {0}
      run: |
        cd build
        echo "📊 Verifying Excel support..."
        if ./bin/analytics_app.exe --help | grep -i excel; then
          echo "✅ Excel support: ENABLED"
        else
          echo "❌ Excel support: DISABLED"
        fi
        
    - name: Create artifact
      if: ${{ inputs.create-artifact }}
      shell: cmd
      run: |
        mkdir artifacts
        copy build\bin\analytics_app.exe artifacts\
        copy build\bin\demo_datamodels.exe artifacts\
        # Копируем DLL зависимости если есть
        copy C:\msys64\mingw64\bin\libxlsreader*.dll artifacts\ 2>nul || echo "No libxls DLLs found"
        Compress-Archive -Path artifacts\* -DestinationPath analytics-app-windows-v0.1.0.zip