name: "Windows Build"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: ""
      create-artifact:
        required: false
        type: boolean
        default: false

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSYS2 with available GCC
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: |
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          make
          autoconf
          automake
          libtool
          wget
        
    - name: Install libxls from stable release v1.6.3
      shell: msys2 {0}
      run: |
        echo "📦 Installing libxls v1.6.3 from stable release..."
        cd /tmp
        
        # Скачиваем стабильный релиз версии 1.6.3
        wget https://github.com/libxls/libxls/releases/download/v1.6.3/libxls-1.6.3.tar.gz
        tar -xzf libxls-1.6.3.tar.gz
        cd libxls-1.6.3
        
        # Конфигурируем и собираем
        echo "⚙️  Configuring libxls..."
        ./configure --prefix=/mingw64
        
        echo "🔨 Building libxls..."
        make
        
        echo "📥 Installing libxls..."
        make install
        
        echo "✅ libxls v1.6.3 successfully installed"
        
        echo "🔍 Verification:"
        pkg-config --exists libxls && echo "✅ pkg-config can find libxls" || echo "⚠️  pkg-config cannot find libxls"
        find /mingw64 -name "*xls*" -type f | head -10
        
    - name: Build application
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        
        BUILD_TYPE_FLAG=""
        if [ -n "${{ inputs.build-type }}" ]; then
          BUILD_TYPE_FLAG="-DCMAKE_BUILD_TYPE=${{ inputs.build-type }}"
        fi
        
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"
        export PATH="/mingw64/bin:$PATH"
        
        cmake -G Ninja $BUILD_TYPE_FLAG ..
        ninja
        
    - name: Run tests
      shell: msys2 {0}
      run: |
        cd build
        echo "🧪 Running tests..."
        ./test_datamodels.exe
        ./test_gradecalculator.exe
        ./test_filesystem.exe
        
    - name: Test demo programs
      shell: msys2 {0}
      run: |
        cd build
        echo "🎯 Testing demo programs..."
        ./bin/demo_datamodels.exe
        ./bin/analytics_app.exe --help
        
    - name: Verify Excel support
      shell: msys2 {0}
      run: |
        cd build
        echo "📊 Verifying Excel support..."
        if ./bin/analytics_app.exe --help | grep -i excel; then
          echo "✅ Excel support: ENABLED"
          ./bin/analytics_app.exe --version && echo "✅ Application works correctly"
        else
          echo "❌ Excel support: DISABLED"
          exit 1
        fi
        
    - name: Create artifact
      if: ${{ inputs.create-artifact }}
      shell: cmd
      run: |
        mkdir artifacts
        copy build\bin\analytics_app.exe artifacts\
        copy build\bin\demo_datamodels.exe artifacts\
        copy C:\msys64\mingw64\bin\libxlsreader*.dll artifacts\ 2>nul || echo "No libxls DLLs to copy"
        copy C:\msys64\mingw64\bin\libiconv*.dll artifacts\ 2>nul || echo "No iconv DLLs to copy"
        copy C:\msys64\mingw64\bin\libwinpthread*.dll artifacts\ 2>nul || echo "No pthread DLLs to copy"
        copy C:\msys64\mingw64\bin\libgcc_s_seh*.dll artifacts\ 2>nul || echo "No libgcc DLLs to copy"
        Compress-Archive -Path artifacts\* -DestinationPath analytics-app-windows-v0.1.0.zip
        
    - name: Windows build report
      shell: msys2 {0}
      run: |
        echo "🏗️  Windows Build Report"
        echo "========================"
        gcc --version | head -1
        echo "✅ libxls v1.6.3: INSTALLED"
        echo "✅ Application: COMPILED"
        echo "✅ Tests: PASSED"
        echo "✅ Excel Parsing: ENABLED"
        echo "📦 Artifact: READY"