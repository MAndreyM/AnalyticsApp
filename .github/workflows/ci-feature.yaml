windows-build:
  name: "Build on Windows"
  runs-on: windows-latest
  
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
    
  - name: Install dependencies
    run: |
      choco install ninja -y
      
  - name: Temporarily disable pkg-config for Windows CI
    run: |
      echo "🛠️ Temporarily disabling pkg-config check for Windows build..."
      (Get-Content CMakeLists.txt) -replace 'find_package\(PkgConfig REQUIRED\)', '# find_package(PkgConfig REQUIRED)  # Temporarily disabled for Windows CI' | Set-Content CMakeLists.txt
      echo "✅ Modified CMakeLists.txt - pkg-config check disabled"
      
  - name: Configure and build
    run: |
      mkdir build
      cd build
      cmake -G Ninja ..
      ninja
      
  - name: Run Phase 2 verification
    shell: cmd
    run: |
      cd build
      echo "🧪 Running Phase 2 verification..."
      test_datamodels.exe
      test_gradecalculator.exe
      test_filesystem.exe
      
  - name: Test demo program
    shell: cmd
    run: |
      cd build
      echo "🎯 Testing demo program..."
      bin\demo_datamodels.exe
      
  - name: Test main application
    shell: cmd
    run: |
      cd build
      bin\analytics_app.exe --help

feature-branch-report:
  name: "Feature Branch Report"
  runs-on: ubuntu-latest
  needs: [redos-build, altlinux-latest-build, altlinux-10-build, windows-build]