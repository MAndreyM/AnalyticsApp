name: CI - Feature Branches

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ 'feature/**', 'develop' ]

jobs:
  redos-build:
    uses: ./.github/workflows/job-redos-build.yaml

  altlinux-latest-build:
    uses: ./.github/workflows/job-altlinux-latest-build.yaml

  altlinux-10-build:
    uses: ./.github/workflows/job-altlinux-10-build.yaml

  windows-build:
    uses: ./.github/workflows/job-windows-build.yaml

  feature-branch-report:
    uses: ./.github/workflows/report-feature-branch.yaml
    needs: [redos-build, altlinux-latest-build, altlinux-10-build, windows-build]