name: CI - Feature Branches

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ 'feature/**', 'develop' ]

jobs:
  redos-build:
    name: "Build on RedOS"
    runs-on: ubuntu-latest
    container:
      image: mandrm/redos-ci-analytics:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on RedOS
      run: |
        echo "🔨 Building on RedOS..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Run Phase 2 verification
      run: |
        echo "🧪 Running Phase 2 verification..."
        cd build
        ./test_datamodels
        ./test_gradecalculator
        ./test_filesystem
        
    - name: Test demo program
      run: |
        cd build
        echo "🎯 Testing demo program..."
        ./bin/demo_datamodels
        
    - name: Test main application
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: RedOS environment info
      run: |
        echo "✅ RedOS Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  altlinux-latest-build:
    name: "Build on Alt Linux Latest"
    runs-on: ubuntu-latest
    container:
      image: mandrm/altlinux-ci-analytics:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on Alt Linux Latest
      run: |
        echo "🔨 Building on Alt Linux Latest..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Run Phase 2 verification
      run: |
        echo "🧪 Running Phase 2 verification..."
        cd build
        ./test_datamodels
        ./test_gradecalculator
        ./test_filesystem
        
    - name: Test binary on Alt Linux
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: Alt Linux environment info
      run: |
        echo "✅ Alt Linux Latest Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  altlinux-10-build:
    name: "Build on Alt Linux 10"
    runs-on: ubuntu-latest
    container:
      image: mandrm/altlinux-ci-analytics:alt10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on Alt Linux 10
      run: |
        echo "🔨 Building on Alt Linux 10..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Run Phase 2 verification
      run: |
        echo "🧪 Running Phase 2 verification..."
        cd build
        ./test_datamodels
        ./test_gradecalculator
        ./test_filesystem
        
    - name: Test binary on Alt Linux 10
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: Alt Linux 10 environment info
      run: |
        echo "✅ Alt Linux 10 Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  windows-build:
    name: "Build on Windows"
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        choco install ninja msys2 -y
        C:\msys64\usr\bin\pacman.exe -Syu --noconfirm --needed pkg-config mingw-w64-x86_64-gcc
      
    - name: Configure and build
      run: |
        mkdir build
        cd build
        $env:PATH = "C:\msys64\usr\bin;" + $env:PATH
        cmake -G Ninja ..
        ninja
        
    - name: Run Phase 2 verification
      shell: cmd
      run: |
        cd build
        echo "🧪 Running Phase 2 verification..."
        test_datamodels.exe
        test_gradecalculator.exe
        test_filesystem.exe
        
    - name: Test demo program
      shell: cmd
      run: |
        cd build
        echo "🎯 Testing demo program..."
        bin\demo_datamodels.exe
        
    - name: Test main application
      shell: cmd
      run: |
        cd build
        bin\analytics_app.exe --help

  feature-branch-report:
    name: "Feature Branch Report"
    runs-on: ubuntu-latest
    needs: [redos-build, altlinux-latest-build, altlinux-10-build, windows-build]
    
    steps:
    - name: Generate feature report
      run: |
        echo "🎯 FEATURE BRANCH CI REPORT - PHASE 2"
        echo "======================================"
        echo "Branch: ${{ github.ref }}"
        echo "Event: ${{ github.event_name }}"
        echo "SHA: ${{ github.sha }}"
        echo ""
        echo "📋 Platform Status:"
        echo "✅ RedOS: Build and Phase 2 tests successful"
        echo "✅ Alt Linux Latest: Build and Phase 2 tests successful"
        echo "✅ Alt Linux 10: Build and Phase 2 tests successful"
        echo "✅ Windows: Build and Phase 2 tests successful"
        echo ""
        echo "🧪 Phase 2 Test Results:"
        echo "  - Data models tests: PASSED"
        echo "  - Grade calculator tests (4 scenarios): PASSED"
        echo "  - File system utilities tests: PASSED"
        echo "  - Demo program: WORKING"
        echo "  - Main application: WORKING"
        echo ""
        echo "🚀 Ready for PR review and merge to develop"
        echo "📦 Phase 2 implementation complete and verified"