name: CI - Feature Branches

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ 'feature/**', 'develop' ]

jobs:
  redos-build:
    name: "Build on RedOS"
    runs-on: ubuntu-latest
    container:
      image: mandrm/redos-ci-analytics:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on RedOS
      run: |
        echo "🔨 Building on RedOS..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Test binary on RedOS
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: RedOS environment info
      run: |
        echo "✅ RedOS Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  altlinux-latest-build:
    name: "Build on Alt Linux Latest"
    runs-on: ubuntu-latest
    container:
      image: mandrm/altlinux-ci-analytics:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on Alt Linux Latest
      run: |
        echo "🔨 Building on Alt Linux Latest..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Test binary on Alt Linux
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: Alt Linux environment info
      run: |
        echo "✅ Alt Linux Latest Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  altlinux-10-build:
    name: "Build on Alt Linux 10"
    runs-on: ubuntu-latest
    container:
      image: mandrm/altlinux-ci-analytics:alt10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build on Alt Linux 10
      run: |
        echo "🔨 Building on Alt Linux 10..."
        mkdir build && cd build
        cmake -G Ninja ..
        ninja
        
    - name: Test binary on Alt Linux 10
      run: |
        cd build
        ./bin/analytics_app --help
        
    - name: Alt Linux 10 environment info
      run: |
        echo "✅ Alt Linux 10 Environment:"
        cat /etc/os-release | grep -E "^(NAME|VERSION)="

  windows-build:
    name: "Build on Windows"
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        choco install ninja pkgconfiglite -y
        
    - name: Configure and build
      run: |
        mkdir build
        cd build
        cmake -G Ninja ..
        ninja
        
    - name: Test binary on Windows
      shell: cmd
      run: |
        cd build
        .\bin\analytics_app.exe --help

  feature-branch-report:
    name: "Feature Branch Report"
    runs-on: ubuntu-latest
    needs: [redos-build, altlinux-latest-build, altlinux-10-build, windows-build]
    
    steps:
    - name: Generate feature report
      run: |
        echo "🎯 FEATURE BRANCH CI REPORT"
        echo "==========================="
        echo "Branch: ${{ github.ref }}"
        echo "Event: ${{ github.event_name }}"
        echo "SHA: ${{ github.sha }}"
        echo ""
        echo "📋 Platform Status:"
        echo "✅ RedOS: Build successful"
        echo "✅ Alt Linux Latest: Build successful"
        echo "✅ Alt Linux 10: Build successful"
        echo "✅ Windows: Build successful"
        echo ""
        echo "🚀 Ready for PR review and merge to develop"